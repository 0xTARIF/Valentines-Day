<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #ff8fb1, #ff4d6d, #ff8fb1);
            background-size: 400% 400%;
            animation: bgMove 8s infinite ease;
            overflow: hidden;
            text-align: center;
            color: white;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .card8 {
            background: #ff1e56;
            border: 6px solid white;
            padding: 40px 25px;
            box-shadow: 10px 10px 0 black;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        h1 {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btnRow {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .btn8 {
            border: 4px solid white;
            padding: 14px 24px;
            box-shadow: 4px 4px 0 black;
            transition: 0.15s;
        }

        .btn8:active {
            transform: translate(2px,2px);
        }

        .heart {
            position: absolute;
            font-size: 18px;
            animation: rise 6s linear infinite;
            opacity: .7;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(.5);
                opacity: 0;
            }
            10% { opacity: 1 }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

    </style>
</head>

<body>

<div class="card8">

    <h1>Will you be my Valentine?</h1>

    <div class="btnRow">

        <button id="yesBtn" class="btn btn-success btn8">
            YES 💖
        </button>

        <button id="noBtn" class="btn btn-dark btn8">
            NO ❌
        </button>

    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let yesScale = 1;

function moveNo() {

    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    growYes();
}

function growYes() {

    yesScale += 0.15;
    yesBtn.style.transform = `scale(${yesScale})`;
}

/* Move only when hovered */
noBtn.addEventListener("mouseover", moveNo);

/* Mobile support */
noBtn.addEventListener("touchstart", moveNo);

yesBtn.addEventListener("click", () => {

    alert("Then let's go to Iceland Coffee ❤️");

    window.open("https://www.google.com/maps/place/Iceland+Coffee");

});

/* Floating hearts */

function createHeart() {

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.textContent = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = 4 + Math.random() * 4 + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
