<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #ff8fb1, #ff4d6d, #ff8fb1);
            background-size: 400% 400%;
            animation: bgMove 8s infinite ease;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        @keyframes bgMove {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-8bit {
            background: #ff1e56;
            border: 6px solid #fff;
            padding: 45px 35px;
            box-shadow: 10px 10px 0 #000;
            width: 90%;
            max-width: 600px;
            transform: scale(0.6);
            opacity: 0;
            animation: popIn 0.7s ease forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: floatText 2s infinite ease-in-out alternate;
        }

        @keyframes floatText {
            from { transform: translateY(0); }
            to   { transform: translateY(-6px); }
        }

        #btnArea {
            position: relative;
            height: 160px;
        }

        .btn-8bit {
            position: absolute;
            border: 4px solid #fff;
            padding: 16px 28px;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            white-space: nowrap;
            pointer-events: auto;
            opacity: 0;
        }

        .btn-8bit:active {
            transform: translate(2px, 2px);
        }

        .heart {
            position: fixed;
            font-size: 18px;
            animation: rise 6s linear infinite;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes rise {
            0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-8bit">
        <h1>Will you be my Valentine?</h1>
        <div id="btnArea">
            <button id="yesBtn" class="btn btn-success btn-8bit">YES 💖</button>
            <button id="noBtn" class="btn btn-dark btn-8bit">NO ❌</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn  = document.getElementById('noBtn');
        const area   = document.getElementById('btnArea');

        let lastNoX     = -1;
        let lastNoY     = -1;
        let escapeTimer = null;
        let cursorX     = 0;
        let cursorY     = 0;

        document.addEventListener('mousemove', e => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });

        function getMetrics() {
            return {
                w:  area.clientWidth,
                h:  area.clientHeight,
                bw: noBtn.offsetWidth,
                bh: noBtn.offsetHeight,
                yw: yesBtn.offsetWidth,
                yh: yesBtn.offsetHeight
            };
        }

        function placeButtons() {
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const m      = getMetrics();
                    const totalW = m.yw + 20 + m.bw;
                    const startX = Math.max(0, (m.w - totalW) / 2);
                    const yesCY  = Math.max(0, (m.h - m.yh) / 2);
                    const noCY   = Math.max(0, (m.h - m.bh) / 2);
                    const noX    = startX + m.yw + 20;

                    yesBtn.style.left    = startX + 'px';
                    yesBtn.style.top     = yesCY + 'px';
                    yesBtn.style.opacity = '1';

                    noBtn.style.left    = noX + 'px';
                    noBtn.style.top     = noCY + 'px';
                    noBtn.style.opacity = '1';

                    lastNoX = noX;
                    lastNoY = noCY;
                });
            });
        }

        function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
            return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
        }

        function bestEscapePos(curX, curY) {
            const m         = getMetrics();
            const maxX      = m.w - m.bw;
            const maxY      = m.h - m.bh;
            const areaRect  = area.getBoundingClientRect();
            const localCurX = curX - areaRect.left;
            const localCurY = curY - areaRect.top;
            const yesX      = parseFloat(yesBtn.style.left) || 0;
            const yesY      = parseFloat(yesBtn.style.top)  || 0;

            let best      = null;
            let bestScore = -1;

            for (let i = 0; i < 200; i++) {
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;

                const dxCur          = x - localCurX;
                const dyCur          = y - localCurY;
                const distFromCursor = Math.sqrt(dxCur * dxCur + dyCur * dyCur);

                const dxLast       = x - lastNoX;
                const dyLast       = y - lastNoY;
                const distFromLast = Math.sqrt(dxLast * dxLast + dyLast * dyLast);

                const isOverlap = overlap(x, y, m.bw, m.bh, yesX, yesY, m.yw, m.yh);
                if (isOverlap || distFromLast < 120) continue;

                const score = distFromCursor * 0.7 + distFromLast * 0.3;
                if (score > bestScore) {
                    bestScore = score;
                    best = { x, y };
                }
            }

            if (!best) {
                const corners = [
                    { x: 0,    y: 0    },
                    { x: maxX, y: 0    },
                    { x: 0,    y: maxY },
                    { x: maxX, y: maxY }
                ];
                best = corners.reduce((a, b) => {
                    const da = Math.hypot(a.x - localCurX, a.y - localCurY);
                    const db = Math.hypot(b.x - localCurX, b.y - localCurY);
                    return db > da ? b : a;
                });
            }

            return best;
        }

        function runEscape() {
            const pos = bestEscapePos(cursorX, cursorY);
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top  = pos.y + 'px';
            lastNoX = pos.x;
            lastNoY = pos.y;
        }

        function onNoHover() {
            clearTimeout(escapeTimer);
            runEscape();
            escapeTimer = setTimeout(runEscape, 80);
        }

        window.addEventListener('load', placeButtons);
        window.addEventListener('resize', placeButtons);

        noBtn.addEventListener('mouseenter', onNoHover);
        noBtn.addEventListener('mousemove', onNoHover);

        yesBtn.addEventListener('click', () => {
            alert('Then let\'s go to Iceland Coffee ❤️');
            window.open('https://www.google.com/maps/place/Iceland+Coffee/@23.8679947,90.3769204,15.11z/data=!4m6!3m5!1s0x3755c5001c0014a1:0xffdcc8f627de1dd0!8m2!3d23.8695384!4d90.3857818!16s%2Fg%2F11wqq66qq9?entry=ttu&g_ep=EgoyMDI2MDIxMS4wIKXMDSoASAFQAw%3D%3D');
        });

        function createHeart() {
            const h = document.createElement('div');
            h.className   = 'heart';
            h.textContent = '❤';
            h.style.left  = Math.random() * 100 + 'vw';
            h.style.animationDuration = (4 + Math.random() * 4) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
